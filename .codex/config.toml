# Configuração local do Codex para este starter.

model = "gpt-5"
model_reasoning_effort = "high"

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[history]
persistence = "save-all"

[defaults]
language = "pt-BR"
require_plan_for_complex_changes = true
qa_gate_required_after_significant_changes = true

[mcp_servers.webmcp]
command = "webmcp-client"
